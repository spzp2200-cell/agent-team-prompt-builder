<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Team Prompt Builder — AIエージェントチーム指示書ジェネレーター</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2d3646;
    --text:#e6edf3; --sub:#8b98a9; --accent:#4f8ff7; --accent2:#9a6ff7;
    --ok:#3fb970; --chip:#22304a; --chip-on:#2b5cb8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:linear-gradient(160deg,#0d1117 0%,#101726 60%,#131022 100%); color:var(--text);
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif; min-height:100vh; padding:24px 16px 64px;}
  .wrap{max-width:860px; margin:0 auto;}
  header{text-align:center; margin-bottom:28px;}
  header h1{font-size:1.5rem; background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  header p{color:var(--sub); font-size:.9rem; margin-top:6px;}
  .steps{display:flex; gap:6px; margin-bottom:24px;}
  .steps div{flex:1; height:6px; border-radius:3px; background:var(--border); transition:.3s;}
  .steps div.on{background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:26px; box-shadow:0 8px 30px rgba(0,0,0,.35);}
  .card h2{font-size:1.15rem; margin-bottom:6px;}
  .card .lead{color:var(--sub); font-size:.9rem; margin-bottom:20px; line-height:1.6;}
  label.q{display:block; font-weight:600; margin:22px 0 4px; font-size:.95rem;}
  label.q:first-of-type{margin-top:0;}
  .hint{color:var(--sub); font-size:.8rem; margin-bottom:8px; line-height:1.5;}
  textarea,input[type=text]{width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:10px 12px; font-size:.95rem; font-family:inherit; resize:vertical;}
  textarea:focus,input:focus{outline:none; border-color:var(--accent);}
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:8px 0;}
  .chip{background:var(--chip); border:1px solid var(--border); color:var(--text); border-radius:999px;
    padding:7px 14px; font-size:.85rem; cursor:pointer; transition:.15s; user-select:none;}
  .chip:hover{border-color:var(--accent);}
  .chip.on{background:var(--chip-on); border-color:var(--accent); font-weight:600;}
  .cards-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-top:12px;}
  .cat{background:var(--panel2); border:2px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:.15s;}
  .cat:hover{border-color:var(--accent);}
  .cat.on{border-color:var(--accent); background:#1d2c47;}
  .cat .icon{font-size:1.5rem;}
  .cat h3{font-size:.95rem; margin:8px 0 4px;}
  .cat p{color:var(--sub); font-size:.78rem; line-height:1.5;}
  .nav{display:flex; justify-content:space-between; margin-top:26px;}
  button{border:none; border-radius:9px; padding:11px 24px; font-size:.95rem; font-weight:600; cursor:pointer; font-family:inherit; transition:.15s;}
  .btn-next{background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#fff;}
  .btn-next:hover{filter:brightness(1.15);}
  .btn-next:disabled{opacity:.4; cursor:not-allowed;}
  .btn-back{background:var(--panel2); color:var(--sub); border:1px solid var(--border);}
  .btn-back:hover{color:var(--text);}
  .btn-sm{padding:6px 14px; font-size:.8rem;}
  .role{background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px;}
  .role .row{display:flex; gap:10px; align-items:center; margin-bottom:8px;}
  .role input{flex:1; font-weight:600;}
  .role textarea{font-size:.85rem; min-height:52px;}
  .role .del{background:none; border:1px solid var(--border); color:var(--sub); border-radius:8px; padding:6px 12px; font-size:.8rem;}
  .role .del:hover{color:#f77; border-color:#f77;}
  .role.locked{border-color:#3f5f45;}
  .badge{font-size:.7rem; background:#234631; color:#7fd89a; border-radius:999px; padding:3px 10px; white-space:nowrap;}
  .badge.w{background:#2b3a55; color:#9dbcf5;}
  pre{background:#0b0f16; border:1px solid var(--border); border-radius:10px; padding:18px;
    font-size:.82rem; line-height:1.65; white-space:pre-wrap; word-break:break-word; max-height:480px; overflow:auto;
    font-family:"SFMono-Regular",Consolas,"Noto Sans Mono",monospace;}
  .result-actions{display:flex; gap:10px; margin:16px 0;}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ok); color:#fff;
    padding:10px 22px; border-radius:999px; font-size:.9rem; opacity:0; transition:.3s; pointer-events:none;}
  .toast.show{opacity:1;}
  .radio-group{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
  .radio-item{display:flex; gap:10px; align-items:flex-start; background:var(--panel2); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px; cursor:pointer; transition:.15s;}
  .radio-item:hover{border-color:var(--accent);}
  .radio-item.on{border-color:var(--accent); background:#1d2c47;}
  .radio-item b{font-size:.9rem;}
  .radio-item span{display:block; color:var(--sub); font-size:.78rem; margin-top:2px; line-height:1.5;}
  .note{background:#1b2438; border-left:3px solid var(--accent); border-radius:6px; padding:10px 14px;
    font-size:.82rem; color:var(--sub); line-height:1.6; margin-top:16px;}
</style>
</head>
<body>

const TEAMS = {

const CONSTRAINT_CHIPS = ["有料API・有料サービスは使わない","成果物は1ファイルにまとめる","個人情報・機密情報を扱わない","日本語で作成する","無料で運用できる構成にする"];

/* ============ 状態 ============ */
const state = {
  step:0, idea:"", cat:null,
  answers:{},          // {qid: {chips:[], free:""}}
  deliverable:{chips:[],free:""},
  audience:"", success:"",
  constraints:{chips:[],free:""},
  autonomy:"checkpoint",
  team:[],             // [{name,mission,locked}]
  env:"claude", title:""
};
const STEP_NAMES = ["構想","カテゴリ","深掘り","チーム編成","仕上げ","完成"];

/* ============ ユーティリティ ============ */
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function chipsHtml(list, selected, group){
  return '<div class="chips">' + list.map(c =>
    `<div class="chip ${selected.includes(c)?"on":""}" onclick="toggleChip('${group}','${esc(c).replace(/'/g,"\\'")}')">${esc(c)}</div>`
  ).join("") + '</div>';
}
window.toggleChip = function(group, val){
  let target;
  if(group === "deliv") target = state.deliverable;
  else if(group === "cons") target = state.constraints;
  else { state.answers[group] = state.answers[group] || {chips:[],free:""}; target = state.answers[group]; }
  const i = target.chips.indexOf(val);
  i >= 0 ? target.chips.splice(i,1) : target.chips.push(val);
  render();
};

function guessCat(text){
  let best = "other", bestN = 0;
  for(const [cat,kws] of Object.entries(CAT_KEYWORDS)){
    const n = kws.filter(k => text.includes(k)).length;
    if(n > bestN){ best = cat; bestN = n; }
  }
  return best;
}

/* ============ 画面描画 ============ */
function render(){
  $("#stepbar").innerHTML = STEP_NAMES.map((_,i)=>`<div class="${i<=state.step?"on":""}" title="${STEP_NAMES[i]}"></div>`).join("");

      <button class="btn-back" onclick="downloadPrompt()">💾 .md で保存</button>
      <button class="btn-back" onclick="go(2)">✏️ 回答を修正</button>
      <button class="btn-back" onclick="restart()">🔄 最初から</button>
    </div>
    <pre id="prompt-out">${esc(p)}</pre>`;
}
window.copyPrompt = function(){
  navigator.clipboard.writeText(buildPrompt()).then(()=>{
    const t = $("#toast"); t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 1800);
  });
};
window.downloadPrompt = function(){
  const blob = new Blob([buildPrompt()], {type:"text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (state.title.trim() || "agent-team-mission") + ".md";
  a.click(); URL.revokeObjectURL(a.href);
};
window.restart = function(){
  Object.assign(state,{step:0,idea:"",cat:null,answers:{},deliverable:{chips:[],free:""},audience:"",success:"",constraints:{chips:[],free:""},autonomy:"checkpoint",team:[],env:"claude",title:""});
  render();
};

render();
</script>
</body>

</html>
